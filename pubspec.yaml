name: sagen
description: "SAGEN - Tu guía digital. Aprende ciberseguridad de forma inteligente."
publish_to: 'none'
version: 5.1.0+7

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  # Networking
  http: ^1.6.0
  google_generative_ai: ^0.4.6

  # Sharing
  share_plus: ^12.0.0

  # Storage
  shared_preferences: ^2.5.5
  flutter_secure_storage: ^10.2.0

  # Firebase
  firebase_core: ^3.15.2
  firebase_auth: ^5.7.0
  cloud_firestore: ^5.6.0
  firebase_crashlytics: ^4.3.10
  firebase_analytics: ^11.4.4
  google_sign_in: ^6.3.0
  flutter_facebook_auth: ^7.1.1

  # UI
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2

  # Data
  flutter_riverpod: ^2.6.1
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Utilities
  path_provider: ^2.1.6
  crypto: ^3.0.6
  speech_to_text: ^7.3.0
  connectivity_plus: ^6.1.4
  google_mobile_ads: ^5.2.0
  url_launcher: ^6.3.1
  lottie: ^3.1.3
  flutter_animate: ^4.5.2
  flutter_dynamic_icon_plus: ^1.4.1
  flutter_local_notifications: ^18.0.1
  timezone: ^0.10.1
  app_links: ^6.3.2
  firebase_app_check: ^0.3.2+10
  local_auth: ^3.0.1
  go_router: ^17.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mocktail: ^1.0.4

  # Code Generation
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  image_path: "assets/sagen_icon.png"
  adaptive_icon_foreground: "assets/sagen_icon.png"
  adaptive_icon_background: "#0D47A1"
  adaptive_icon_inset: 16
  min_sdk_android: 21

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/mascot/emotions/
    - assets/streak/
    - assets/ui/google_logo.png
    - assets/animations/
